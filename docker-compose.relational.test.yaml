services:
  postgres:
    image: postgres:17.9-alpine
    expose:
      - 5432
    environment:
      # Bootstrap with migration superuser (see docker-compose.yaml).
      POSTGRES_USER: ${DATABASE_MIGRATION_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_MIGRATION_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}

  maildev:
    image: maildev/maildev:2.1.0
    expose:
      - 1080
      - 1025

  redis:
    image: redis:7-alpine
    expose:
      - 6379

  api:
    build:
      context: .
      dockerfile: relational.test.Dockerfile
    env_file:
      - env-example-relational
    environment:
      DATABASE_HOST: postgres
      REDIS_HOST: redis
      MAIL_HOST: maildev
    volumes:
      - ./src:/usr/src/app/src
      - ./test:/usr/src/app/test
