# Dev override — merged over docker-compose.yml.
#   npm run docker:dev:up
# Full stack in docker: Postgres runs in a container and loads .env.development.
services:
  postgres:
    image: postgres:17.9-alpine
    restart: unless-stopped
    environment:
      # Bootstrap PG with the migration superuser (DATABASE_MIGRATION_USERNAME),
      # NOT the runtime role — the InitExtensions migration later creates the
      # non-superuser app role. Seeding PG with the runtime role would block
      # migrations and break the RLS layout (CLAUDE.md §5).
      POSTGRES_USER: ${DATABASE_MIGRATION_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_MIGRATION_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}
    ports:
      # Host access for psql / adminer. Host 5432/5433 are taken by host PG,
      # so map 55432 (CLAUDE.md §6).
      - "55432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DATABASE_MIGRATION_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 10

  api:
    env_file:
      - .env.development
    depends_on:
      postgres:
        condition: service_healthy

  worker:
    env_file:
      - .env.development
    depends_on:
      postgres:
        condition: service_healthy

volumes:
  postgres-data:
