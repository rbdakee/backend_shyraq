name: CI

# Gate on push to main + every PR. The full pipeline (lint → unit →
# integration → e2e) runs inside docker-compose against real PG + Redis,
# matching local INTEGRATION_DB=1 npm test workflow.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: lint + unit + integration + e2e (docker-compose)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # The CI compose file references docker-compose.relational.ci.yaml
      # and env-example-relational. startup.relational.ci.sh inside the
      # api container runs: wait-for-pg/redis → migrations → seeds →
      # lint → unit → integration → boot app → e2e. Single command — if
      # any stage fails, the api container exits non-zero and `up
      # --exit-code-from api` propagates that to the workflow.
      - name: Run full test suite (lint + unit + integration + e2e)
        run: |
          docker compose \
            -f docker-compose.relational.ci.yaml \
            --env-file env-example-relational \
            -p ci \
            up --build --abort-on-container-exit --exit-code-from api

      - name: Dump api logs on failure
        if: failure()
        run: |
          docker compose -f docker-compose.relational.ci.yaml -p ci logs api || true
          docker compose -f docker-compose.relational.ci.yaml -p ci logs postgres || true

      - name: Tear down
        if: always()
        run: |
          docker compose -f docker-compose.relational.ci.yaml -p ci down -v || true
