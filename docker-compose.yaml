services:
  postgres:
    image: postgres:17.9-alpine
    ports:
      - ${DATABASE_PORT}:5432
    volumes:
      - boilerplate-db:/var/lib/postgresql/data
    environment:
      # Bootstrap PG with the migration superuser (DATABASE_MIGRATION_USERNAME)
      # — NOT the runtime app role. InitExtensions later creates the
      # non-superuser shyraq_app via the migration CLI. Seeding PG with the
      # runtime role would (a) block the migration step (no superuser exists)
      # and (b) violate the RLS layout from CLAUDE.md §5: the runtime role MUST
      # NOT be a superuser, otherwise FORCE ROW LEVEL SECURITY is bypassed and
      # tenant isolation is silently broken.
      POSTGRES_USER: ${DATABASE_MIGRATION_USERNAME}
      POSTGRES_PASSWORD: ${DATABASE_MIGRATION_PASSWORD}
      POSTGRES_DB: ${DATABASE_NAME}

  maildev:
    image: maildev/maildev:2.1.0
    ports:
      - ${MAIL_CLIENT_PORT}:1080
      - ${MAIL_PORT}:1025

  adminer:
    image: adminer
    restart: always
    ports:
      - 8080:8080

  # Uncomment to use redis
  # redis:
  #   image: redis:7-alpine
  #   ports:
  #     - 6379:6379

  api:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - ${APP_PORT}:${APP_PORT}

volumes:
  boilerplate-db:
